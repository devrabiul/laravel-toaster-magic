<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4A3A" />
      <stop offset="1" stop-color="#D81E0F" />
    </linearGradient>
  </defs>

  <!-- Laravel-red rounded square -->
  <rect width="512" height="512" rx="116" fill="url(#bg)" />

  <!-- White toast notification card -->
  <rect x="96" y="180" width="320" height="152" rx="30" fill="#ffffff" />

  <!-- Left accent bar -->
  <rect x="126" y="210" width="16" height="92" rx="8" fill="#FF3B2E" />

  <!-- Icon circle with a success check -->
  <circle cx="196" cy="256" r="30" fill="#FF3B2E" />
  <path d="M183 256 l9 9 17 -18" fill="none" stroke="#ffffff" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" />

  <!-- Title + description lines -->
  <rect x="246" y="232" width="120" height="20" rx="10" fill="#232a33" />
  <rect x="246" y="264" width="150" height="15" rx="7.5" fill="#b6bfc9" />
</svg>
